download_error=Download Error
download_error_reason_http_4xx_title=Request Failed
download_error_reason_http_4xx_description=The server rejected the download request due to a client-side issue such as an invalid request, missing permissions, or an incorrect URL.
download_error_reason_http_4xx_suggestion=Check the download link, login status, or access permissions.
download_error_reason_http_401_title=Authentication Required
download_error_reason_http_401_description=The server requires authentication before allowing the download. Your current session does not have valid credentials.
download_error_reason_http_401_suggestion=Log in through your browser and refresh the download link or pass proper credentials to the app.
download_error_reason_http_403_title=Access Denied
download_error_reason_http_403_description=The server is blocking access to this file. This may be due to missing permissions, region restrictions, or expired access.
download_error_reason_http_403_suggestion=Ensure you have permission to access the file.
download_error_reason_http_404_title=Not Found
download_error_reason_http_404_description=The requested file does not exist on the server. It may have been moved, renamed, or deleted.
download_error_reason_http_404_suggestion=Verify the download URL or check for an updated link from the source website, then refresh the download link in the app.
download_error_reason_http_407_title=Proxy Authentication Required
download_error_reason_http_407_description=The proxy server requires authentication before it can forward your request.
download_error_reason_http_407_suggestion=Check your proxy credentials in settings or disable the proxy if it is not required.
download_error_reason_http_429_title=Too Many Requests
download_error_reason_http_429_description=The server is limiting requests because too many downloads were started in a short period of time.
download_error_reason_http_429_suggestion=Wait before retrying or reduce the number of parallel downloads and threads.
download_error_reason_http_5xx_title=Server Error
download_error_reason_http_5xx_description=The server encountered an internal error while processing the download request. This is usually temporary and not caused by your device.
download_error_reason_http_5xx_suggestion=Try again later.
download_error_reason_http_503_title=Service Unavailable
download_error_reason_http_503_description=The server is temporarily unavailable due to maintenance or overload.
download_error_reason_http_503_suggestion=Try again later or check the service status if available.
download_error_reason_http_default_title=Download Failed
download_error_reason_http_default_description=The server responded with an unexpected HTTP status\: {{statusCode}} - {{statusMessage}}
download_error_reason_http_default_suggestion=Try again later or verify the download link. If you are using a proxy or VPN, try disabling it. If you believe this should work, please report it.
download_error_reason_changed_etag_title=File Changed (ETag Mismatch)
download_error_reason_changed_etag_description=The file on the server has changed since the download started, as detected by a different ETag value. The partial download may no longer match the current file.\n\nPrevious ETag\: {{oldETag}}\nCurrent ETag\: {{newETag}}
download_error_reason_changed_etag_suggestion=Restart the download to ensure file integrity.
download_error_reason_changed_size_title=File Size Changed
download_error_reason_changed_size_description=The expected file size does not match the current server response. This usually means the file was updated or replaced.\n\nPrevious size\: {{oldSize}}\nCurrent size\: {{newSize}}
download_error_reason_changed_size_suggestion=Restart the download to retrieve the correct version of the file.
download_error_reason_changed_web_title=Unexpected Web Page Response
download_error_reason_changed_web_description=The server returned a web page instead of the expected file.
download_error_reason_changed_web_suggestion=This may be temporary. Refresh the download link in case it is outdated.
download_error_reason_no_space_title=Not Enough Disk Space
download_error_reason_no_space_description=There is not enough free disk space to complete the download. The download requires {{required}}, but only {{available}} is available in the selected location.
download_error_reason_no_space_suggestion=Free up disk space and try again.
download_error_reason_destination_title=Write Error
download_error_reason_destination_description=Cannot write to the download destination due to\:\n\nException\: {{exceptionName}}\nMessage\: {{exceptionMessage}}.
download_error_reason_destination_suggestion=Choose a different download folder or update folder permissions. Ensure the application has the correct permissions to write to this location.
download_error_reason_server_resume_change_title=Resume No Longer Supported
download_error_reason_server_resume_change_description=The server no longer supports resuming this download.
download_error_reason_server_resume_change_suggestion=Try again. If the issue persists, restart the download from the beginning.
download_error_reason_timeout_title=Connection Timed Out
download_error_reason_timeout_description=The server took too long to respond and the connection was closed. This usually happens due to slow internet, high server load, or unstable network conditions.
download_error_reason_timeout_suggestion=Check your internet connection and try again.
download_error_reason_unknown_host_title=Server Not Found
download_error_reason_unknown_host_description=The server address could not be resolved. This usually means the domain name is incorrect, the server is down, or there is a DNS issue on your network.
download_error_reason_unknown_host_suggestion=Ensure you are connected to the internet, verify the download URL, and try again. If the issue continues, try switching networks.
download_error_reason_connection_reset_title=Connection Reset
download_error_reason_connection_reset_description=The connection was unexpectedly closed while downloading the file. This usually happens due to network instability, server interruption, or a firewall closing the connection.
download_error_reason_connection_reset_suggestion=Check your internet connection and try again. If you are using a VPN or proxy, try disabling it. If the issue persists, it may be caused by the server.
download_error_reason_ssl_verification_failed_title=Secure Connection Failed
download_error_reason_ssl_verification_failed_description=The secure connection could not be established because the SSL certificate could not be verified. This may be caused by an incorrect system clock, a misconfigured server, or network interception.
download_error_reason_ssl_verification_failed_suggestion=Check your system date and time.\nIf you are using a proxy, VPN, or antivirus with HTTPS inspection, try disabling it.\nIf the issue persists, the server may have an invalid or misconfigured certificate.\n\nAs a last resort (not recommended), you can enable "Ignore SSL Certificates" in settings.\nThis reduces security and should only be used if you trust the connection.
download_error_reason_default_title=Something Went Wrong
download_error_reason_default_description=An unexpected error occurred while downloading the file.\n\nException\: {{exceptionName}}\nMessage\: {{exceptionMessage}}
download_error_reason_default_suggestion=Try restarting the download. If the issue continues, check your internet connection and the download link. If you believe this is a bug, please report it so it can be investigated.
