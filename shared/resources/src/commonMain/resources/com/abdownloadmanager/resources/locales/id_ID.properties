download_error_reason_http_403_suggestion=Pastikan Anda memiliki izin untuk mengakses berkas tersebut.
download_error_reason_http_404_title=Tidak Ditemukan
download_error_reason_http_404_description=Berkas yang diminta tidak ada di server. Mungkin berkas tersebut telah dipindahkan, diganti namanya, atau dihapus.
download_error_reason_http_404_suggestion=Periksa URL unduhan atau cari tautan terbaru dari situs web aslinya, lalu segarkan tautan unduhan di aplikasi.
download_error_reason_http_407_title=Otentikasi Proksi Diperlukan
download_error_reason_http_407_description=Server proxy memerlukan otentikasi sebelum dapat meneruskan permintaan Anda.
download_error_reason_http_407_suggestion=Periksa kredensial proxy Anda di pengaturan atau nonaktifkan proxy jika tidak diperlukan.
download_error_reason_http_429_title=Terlalu Banyak Permintaan
download_error_reason_http_429_description=Server membatasi permintaan karena terlalu banyak unduhan yang dimulai dalam waktu singkat.
download_error_reason_http_429_suggestion=Tunggu sejenak sebelum mencoba lagi atau kurangi jumlah unduhan paralel dan jumlah utas.
download_error_reason_http_5xx_title=Kesalahan Server
download_error_reason_http_5xx_description=Server mengalami kesalahan internal saat memproses permintaan unduhan. Hal ini biasanya bersifat sementara dan bukan disebabkan oleh perangkat Anda.
download_error_reason_http_5xx_suggestion=Coba lagi nanti.
download_error_reason_http_503_title=Layanan Tidak Tersedia
download_error_reason_http_503_description=Server sedang tidak tersedia untuk sementara waktu karena sedang dalam pemeliharaan atau mengalami kelebihan beban.
download_error_reason_http_503_suggestion=Coba lagi nanti atau periksa status layanan jika tersedia.
download_error_reason_http_default_title=Unduhan Gagal
download_error_reason_http_default_description=Server merespons dengan status HTTP yang tidak terduga\: {{statusCode}} - {{statusMessage}}
download_error_reason_http_default_suggestion=Coba lagi nanti atau periksa tautan unduhannya. Jika Anda menggunakan proxy atau VPN, coba nonaktifkan. Jika menurut Anda hal ini seharusnya berfungsi, silakan laporkan.
download_error_reason_changed_etag_title=File Berubah (ETag Tidak Cocok)
download_error_reason_changed_etag_description=File di server telah berubah sejak proses pengunduhan dimulai, sebagaimana terdeteksi dari nilai ETag yang berbeda. Unduhan parsial tersebut mungkin tidak lagi sesuai dengan file saat ini.\n\nETag sebelumnya\: {{oldETag}}\nETag saat ini\: {{newETag}}
download_error_reason_changed_etag_suggestion=Mulai ulang proses pengunduhan untuk memastikan keutuhan file.
download_error_reason_changed_size_title=Ukuran File Berubah
download_error_reason_changed_size_description=Ukuran file yang diperkirakan tidak sesuai dengan respons server saat ini. Hal ini biasanya berarti file tersebut telah diperbarui atau diganti.\n\nUkuran sebelumnya\: {{oldSize}}\nUkuran saat ini\: {{newSize}}
download_error_reason_changed_size_suggestion=Mulai ulang proses pengunduhan untuk mendapatkan versi file yang benar.
download_error_reason_changed_web_title=Respons Halaman Web yang Tidak Terduga
download_error_reason_changed_web_description=Server mengembalikan halaman web alih-alih berkas yang diharapkan.
download_error_reason_changed_web_suggestion=Hal ini mungkin hanya sementara. Silakan perbarui tautan unduhan jika tautan tersebut sudah kedaluwarsa.
download_error_reason_no_space_title=Ruang Penyimpanan Tidak Cukup
download_error_reason_no_space_description=Ruang penyimpanan kosong tidak cukup untuk menyelesaikan pengunduhan. Pengunduhan ini membutuhkan {{required}}, tetapi hanya {{available}} yang tersedia di lokasi yang dipilih.
download_error_reason_no_space_suggestion=Kosongkan ruang penyimpanan, lalu coba lagi.
download_error_reason_destination_title=Kesalahan Penulisan
download_error_reason_destination_description=Tidak dapat menulis ke lokasi tujuan unduhan karena\:\n\nPengecualian\: {{exceptionName}}\nPesan\: {{exceptionMessage}}.
download_error_reason_destination_suggestion=Pilih folder unduhan yang berbeda atau perbarui izin folder. Pastikan aplikasi memiliki izin yang tepat untuk menulis ke lokasi ini.
download_error_reason_server_resume_change_title=Resume Tidak Lagi Didukung
download_error_reason_server_resume_change_description=Server tidak lagi mendukung kelanjutan pengunduhan ini.
download_error_reason_server_resume_change_suggestion=Coba lagi. Jika masalahnya masih terjadi, mulai ulang proses unduhan dari awal.
download_error_reason_timeout_title=Waktu Koneksi Habis
download_error_reason_timeout_description=Server membutuhkan waktu terlalu lama untuk merespons, sehingga koneksi terputus. Hal ini biasanya terjadi akibat koneksi internet yang lambat, beban server yang tinggi, atau kondisi jaringan yang tidak stabil.
download_error_reason_timeout_suggestion=Periksa koneksi internet Anda dan coba lagi.
download_error_reason_unknown_host_title=Server Tidak Ditemukan
download_error_reason_unknown_host_description=Alamat server tidak dapat dikenali. Hal ini biasanya berarti nama domain salah, server sedang tidak aktif, atau terdapat masalah DNS pada jaringan Anda.
download_error_reason_unknown_host_suggestion=Pastikan Anda terhubung ke internet, periksa tautan unduhan, lalu coba lagi. Jika masalah masih berlanjut, coba ganti jaringan.
download_error_reason_connection_reset_title=Atur Ulang Koneksi
download_error_reason_connection_reset_description=Koneksi terputus secara tiba-tiba saat mengunduh berkas. Hal ini biasanya terjadi akibat ketidakstabilan jaringan, gangguan pada server, atau firewall yang memutus koneksi.
download_error_reason_connection_reset_suggestion=Periksa koneksi internet Anda dan coba lagi. Jika Anda menggunakan VPN atau proxy, coba nonaktifkan. Jika masalah tetap terjadi, kemungkinan besar disebabkan oleh server.
download_error_reason_ssl_verification_failed_title=Koneksi Aman Gagal
download_error_reason_ssl_verification_failed_description=Koneksi aman tidak dapat dibuat karena sertifikat SSL tidak dapat diverifikasi. Hal ini mungkin disebabkan oleh jam sistem yang tidak akurat, konfigurasi server yang salah, atau adanya penyadapan jaringan.
download_error_reason_ssl_verification_failed_suggestion=Periksa tanggal dan waktu sistem Anda.\nJika Anda menggunakan proxy, VPN, atau antivirus dengan fitur pemeriksaan HTTPS, coba nonaktifkan fitur tersebut.\nJika masalah tetap terjadi, mungkin sertifikat server tidak valid atau konfigurasinya salah.\n\nSebagai upaya terakhir (tidak disarankan), Anda dapat mengaktifkan opsi "Abaikan Sertifikat SSL" di pengaturan.\nHal ini akan mengurangi tingkat keamanan dan sebaiknya hanya digunakan jika Anda yakin dengan koneksi tersebut.
download_error_reason_default_title=Terjadi Kesalahan
download_error_reason_default_description=Terjadi kesalahan yang tidak terduga saat mengunduh berkas.\n\nPengecualian\: {{exceptionName}}\nPesan\: {{exceptionMessage}}
download_error_reason_default_suggestion=Coba mulai ulang proses unduhan. Jika masalah masih berlanjut, periksa koneksi internet dan tautan unduhan Anda. Jika Anda menduga ini adalah bug, silakan laporkan agar dapat diselidiki.
