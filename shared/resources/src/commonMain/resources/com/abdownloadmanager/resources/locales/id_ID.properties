download_error_reason_http_4xx_title=Permintaan Gagal
download_error_reason_http_4xx_description=Server menolak permintaan unduhan karena adanya masalah di sisi klien, seperti permintaan yang tidak valid, izin yang tidak memadai, atau URL yang salah.
