permissions_initial_title=Pengaturan izin
permissions_initial_description=Agar dapat berfungsi dengan baik, aplikasi ini memerlukan beberapa izin. Pada layar berikutnya, Anda akan melihat tujuan dari setiap izin dan dapat memutuskan izin mana yang ingin Anda izinkan atau lewati.
permissions_done_title=Anda sudah siap
permissions_done_description=Semua sudah siap. Semua izin yang diperlukan telah diberikan dan aplikasi siap digunakan.
permissions_manage_storage_title=Kelola akses penyimpanan
permissions_manage_storage_reason=Izin ini memungkinkan aplikasi untuk mengubah folder unduhan, mendeteksi unduhan ganda dengan lebih akurat, dan mengaktifkan beberapa fitur tambahan. Izin ini bersifat optional, tetapi disarankan untuk pengalaman terbaik.
permission_read_write_external_storage_title=Baca dan tulis penyimpanan
permission_read_write_external_storage_reason=Izin ini memungkinkan aplikasi untuk menyimpan dan mengelola berkas yang diunduh, mengubah lokasi unduhan, serta meningkatkan deteksi unduhan ganda.
permissions_post_notification_title=Notifikasi Pos
permissions_post_notification_reason=Aplikasi ini perlu berjalan di latar belakang untuk mengelola unduhan. Pemberitahuan digunakan untuk memberitahu Anda dan memungkinkan operasi di latar belakang.
permissions_ignore_battery_optimization_title=Abaikan Optimalisasi Baterai
permissions_ignore_battery_optimization_reason=Beberapa perangkat secara agresif membatasi aktivitas latar belakang untuk menghemat baterai, yang dapat menghentikan atau menunda unduhan saat aplikasi tidak terbuka. Anda dapat secara opsional mengecualikan aplikasi dari pengoptimalan baterai untuk memastikan unduhan terus berlanjut tanpa terputus.
