settings_download_thread_count_with_large_value_describe=Advertencia\: Configurar un alto número de hilos puede aumentar el uso de recursos del sistema, reducir el rendimiento o causar problemas de conexión con los servidores. Utilice valores más altos sólo si comprende el impacto potencial en su sistema y su red.
