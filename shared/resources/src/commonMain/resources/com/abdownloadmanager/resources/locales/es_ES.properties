settings_delete_partial_file_on_download_cancellation_description=Cuando se cancela una descarga, el archivo descargado parcialmente se eliminará del disco. Esto ayuda a mantener limpia la carpeta de descargas y reduce el uso innecesario de espacio en disco. Sin embargo, la descarga se reiniciará desde el principio la próxima vez que la inicie.
