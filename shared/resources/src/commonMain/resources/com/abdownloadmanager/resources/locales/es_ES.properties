suggestion=Sugerencias\:
download_error=Error de Descarga
download_error_reason_http_4xx_title=Error en la solicitud
download_error_reason_http_4xx_description=El servidor rechazó la solicitud de descarga debido a un problema del lado del cliente, como una solicitud no válida, permisos insuficientes o una URL incorrecta.
download_error_reason_http_4xx_suggestion=Verifica el enlace de descarga, el estado de sesión o los permisos de acceso.
download_error_reason_http_401_title=Se necesita autenticación
download_error_reason_http_401_description=El servidor requiere autenticación antes de permitir la descarga. Su sesión actual no tiene credenciales válidas.
download_error_reason_http_401_suggestion=Inicia sesión a través de tu navegador y actualiza el enlace de descarga o pasa las credenciales adecuadas a la aplicación.
download_error_reason_http_403_title=Acceso denegado
download_error_reason_http_403_description=El servidor está bloqueando el acceso a este archivo. Esto puede deberse a la falta de permisos, restricciones de región o acceso caducado.
download_error_reason_http_403_suggestion=Asegúrate de tener permiso para acceder al archivo.
download_error_reason_http_404_title=No encontrado
download_error_reason_http_404_description=El archivo solicitado no existe en el servidor. Puede que haya sido movido, renombrado o eliminado.
download_error_reason_http_404_suggestion=Verifica la URL de descarga o busca un enlace actualizado en el sitio web de origen, luego actualiza el enlace de descarga en la aplicación.
download_error_reason_http_407_title=Autenticación de Proxy Requerida
download_error_reason_http_407_description=El servidor proxy requiere autenticación antes de que pueda reenviar su petición.
download_error_reason_http_407_suggestion=Compruebe sus credenciales de proxy en la configuración o deshabilite el proxy si no es necesario.
download_error_reason_http_429_title=Demasiadas solicitudes
download_error_reason_http_429_description=El servidor está limitando las peticiones porque demasiadas descargas se iniciaron en un corto periodo de tiempo.
download_error_reason_http_429_suggestion=Espera antes de volver a intentar o reducir el número de descargas e hilos paralelos.
download_error_reason_http_5xx_title=Error de servidor
download_error_reason_http_5xx_description=El servidor encontró un error interno mientras se procesaba la solicitud de descarga. Esto generalmente es temporal y no es causado por el dispositivo.
download_error_reason_http_5xx_suggestion=Inténtalo de nuevo más tarde.
download_error_reason_http_503_title=Servicio no disponible
download_error_reason_http_503_description=El servidor no está disponible temporalmente debido a mantenimiento o sobrecarga.
download_error_reason_http_503_suggestion=Inténtelo de nuevo más tarde o compruebe el estado del servicio si está disponible.
download_error_reason_http_default_title=Descarga fallida
download_error_reason_http_default_description=El servidor respondió con un estado HTTP inesperado\: {{statusCode}} - {{statusMessage}}
download_error_reason_http_default_suggestion=Inténtelo de nuevo más tarde o verifique el enlace de descarga. Si está usando un proxy o VPN, intente desactivarlo. Si cree que esto debería funcionar, por favor repórtelo.
download_error_reason_changed_etag_title=Archivo cambiado (ETag Mismatch)
download_error_reason_changed_etag_description=El archivo en el servidor ha cambiado desde que comenzó la descarga, como se detectó por un valor ETag diferente. La descarga parcial ya no puede coincidir con el archivo actual.\n\nETag anterior\: {{oldETag}}\nETag actual\: {{newETag}}
download_error_reason_changed_etag_suggestion=Reinicia la descarga para garantizar la integridad del archivo.
download_error_reason_changed_size_title=Tamaño del archivo modificado
download_error_reason_changed_size_description=El tamaño del archivo esperado no coincide con la respuesta actual del servidor. Esto generalmente significa que el archivo fue actualizado o reemplazado.\n\nTamaño anterior\: {{oldSize}}\nTamaño actual\: {{newSize}}
download_error_reason_changed_size_suggestion=Reinicie la descarga para recuperar la versión correcta del archivo.
download_error_reason_changed_web_title=Respuesta inesperada de la página web
download_error_reason_changed_web_description=El servidor devolvió una página web en lugar del archivo esperado.
download_error_reason_changed_web_suggestion=Esto puede ser temporal. Actualice el enlace de descarga en caso de que esté desactualizado.
download_error_reason_no_space_title=No hay suficiente espacio en disco
download_error_reason_no_space_description=No hay suficiente espacio libre en disco para completar la descarga. La descarga requiere {{required}}, pero solo {{available}} está disponible en la ubicación seleccionada.
download_error_reason_no_space_suggestion=Libera espacio en disco y vuelva a intentarlo.
download_error_reason_destination_title=Error de escritura
download_error_reason_destination_description=No se puede escribir en el destino de descarga debido a\:\n\nExcepción\: {{exceptionName}}\nMensaje\: {{exceptionMessage}}.
download_error_reason_destination_suggestion=Elija una carpeta de descarga diferente o los permisos de actualización de carpetas. Asegúrese de que la aplicación tiene los permisos correctos para escribir en esta ubicación.
download_error_reason_server_resume_change_title=Reanudación ya no compatible
download_error_reason_server_resume_change_description=El servidor ya no admite reanudar esta descarga.
download_error_reason_server_resume_change_suggestion=Inténtelo de nuevo. Si el problema persiste, reinicie la descarga desde el principio.
download_error_reason_timeout_title=Tiempo de conexión agotado
download_error_reason_timeout_description=El servidor tardó demasiado en responder y la conexión fue cerrada. Esto suele ocurrir debido a la lentitud de Internet, la alta carga del servidor o a condiciones inestables de la red.
download_error_reason_timeout_suggestion=Comprueba tu conexión de Internet e inténtalo de nuevo.
download_error_reason_unknown_host_title=Servidor no encontrado
download_error_reason_unknown_host_description=El servidor no pudo resolver la dirección. Esto generalmente significa que el nombre de dominio es incorrecto, el servidor está caído o hay un problema de DNS en tu red.
download_error_reason_unknown_host_suggestion=Asegúrese de que está conectado a Internet, verifique la URL de descarga e inténtelo de nuevo. Si el problema continúa, intente cambiar de red.
download_error_reason_connection_reset_title=Reiniciar conexión
download_error_reason_connection_reset_description=La conexión se cerró inesperadamente al descargar el archivo. Esto suele ocurrir debido a la inestabilidad de la red, la interrupción del servidor o un cortafuegos cerrando la conexión.
download_error_reason_connection_reset_suggestion=Compruebe su conexión a Internet e inténtelo de nuevo. Si está usando una VPN o proxy, intente desactivarla. Si el problema persiste, puede ser causado por el servidor.
download_error_reason_ssl_verification_failed_title=Conexión segura fallida
download_error_reason_ssl_verification_failed_description=No se pudo establecer la conexión segura porque no se pudo verificar el certificado SSL. Esto puede ser causado por un reloj del sistema incorrecto, un servidor mal configurado o interceptación de red.
download_error_reason_ssl_verification_failed_suggestion=Verifica la fecha y hora de tu sistema. Si usas un proxy, VPN o antivirus con inspección HTTPS, intenta desactivarlo. Si el problema persiste, es posible que el servidor tenga un certificado inválido o mal configurado. Como último recurso (no recomendado), puedes activar "Ignorar certificados SSL" en la configuración. Esto reduce la seguridad y solo debe usarse si confías en la conexión.
download_error_reason_default_title=Algo salió mal
download_error_reason_default_description=Se ha producido un error inesperado al descargar el archivo.\n\nExcepción\: {{exceptionName}}\nMensaje\: {{exceptionMessage}}
download_error_reason_default_suggestion=Intenta reiniciar la descarga. Si el problema continúa, verifica tu conexión a internet y el enlace de descarga. Si crees que es un error de la aplicación, repórtalo para que pueda ser investigado.
