suggestion=Návrh\:
download_error=Chyba stahování
download_error_reason_http_4xx_title=Požadavek selhal
download_error_reason_http_4xx_description=Server odmítl požadavek na stažení kvůli problému na straně klienta, například kvůli neplatnému požadavku, chybějícím oprávněním nebo nesprávné URL adrese.
download_error_reason_http_4xx_suggestion=Zkontrolujte odkaz ke stažení, stav přihlášení nebo přístupová oprávnění.
download_error_reason_http_401_title=Vyžadováno přihlášení
download_error_reason_http_401_description=Server vyžaduje před povolením stahování ověření. Vaše aktuální relace nemá platné přihlašovací údaje.
download_error_reason_http_401_suggestion=Přihlaste se přes prohlížeč a obnovte odkaz ke stažení, nebo zadejte do aplikace platné přihlašovací údaje.
download_error_reason_http_403_title=Přístup odepřen
download_error_reason_http_403_description=Server blokuje přístup k tomuto souboru. Může to být způsobeno chybějícími oprávněními, regionálním omezením nebo vypršením přístupu.
download_error_reason_http_403_suggestion=Ujistěte se, že máte oprávnění k přístupu k tomuto souboru.
download_error_reason_http_404_title=Nenalezeno
download_error_reason_http_404_description=Požadovaný soubor na serveru neexistuje. Mohl být přesunut, přejmenován nebo smazán.
download_error_reason_http_404_suggestion=Zkontrolujte URL adresu ke stažení nebo na zdrojovém webu vyhledejte aktualizovaný odkaz a poté odkaz v aplikaci obnovte.
download_error_reason_http_407_title=Vyžadováno ověření proxy serveru
download_error_reason_http_407_description=Proxy server vyžaduje ověření, než bude moci váš požadavek přeposlat.
download_error_reason_http_407_suggestion=Zkontrolujte přihlašovací údaje proxy serveru v nastavení, nebo proxy vypněte, pokud není potřeba.
download_error_reason_http_429_title=Příliš mnoho požadavků
download_error_reason_http_429_description=Server omezuje požadavky, protože bylo v krátké době spuštěno příliš mnoho stahování.
download_error_reason_http_429_suggestion=Před dalším pokusem chvíli počkejte nebo snižte počet souběžných stahování a vláken.
download_error_reason_http_5xx_title=Chyba serveru
download_error_reason_http_5xx_description=Při zpracování požadavku na stažení došlo na serveru k interní chybě. Obvykle jde o dočasný problém, který není způsoben vaším zařízením.
download_error_reason_http_5xx_suggestion=Zkuste to znovu později.
download_error_reason_http_503_title=Služba nedostupná
download_error_reason_http_503_description=Server je dočasně nedostupný kvůli údržbě nebo přetížení.
download_error_reason_http_503_suggestion=Zkuste to znovu později, nebo pokud je to možné, zkontrolujte stav služby.
download_error_reason_http_default_title=Stahování selhalo
download_error_reason_http_default_description=Server odpověděl neočekávaným stavem HTTP\: {{statusCode}} - {{statusMessage}}
download_error_reason_http_default_suggestion=Zkuste to znovu později nebo zkontrolujte odkaz ke stažení. Pokud používáte proxy nebo VPN, zkuste je vypnout. Pokud si myslíte, že by stahování mělo fungovat, nahlaste to prosím.
download_error_reason_changed_etag_title=Soubor se změnil (neshoda ETag)
download_error_reason_changed_etag_description=Soubor na serveru se od zahájení stahování změnil, což bylo zjištěno podle odlišné hodnoty ETag. Částečně stažený soubor už nemusí odpovídat aktuální verzi souboru.\n\nPůvodní ETag\: {{oldETag}}\nAktuální ETag\: {{newETag}}
download_error_reason_changed_etag_suggestion=Restartujte stahování, aby byla zajištěna integrita souboru.
download_error_reason_changed_size_title=Velikost souboru se změnila
download_error_reason_changed_size_description=Očekávaná velikost souboru neodpovídá aktuální odpovědi serveru. To obvykle znamená, že soubor byl aktualizován nebo nahrazen.\n\nPůvodní velikost\: {{oldSize}}\nAktuální velikost\: {{newSize}}
download_error_reason_changed_size_suggestion=Restartujte stahování, aby se stáhla správná verze souboru.
download_error_reason_changed_web_title=Neočekávaná odpověď ve formě webové stránky
download_error_reason_changed_web_description=Server místo očekávaného souboru vrátil webovou stránku.
download_error_reason_changed_web_suggestion=Může jít o dočasný problém. Zkuste obnovit odkaz ke stažení, pokud je zastaralý.
download_error_reason_no_space_title=Nedostatek místa na disku
download_error_reason_no_space_description=Pro dokončení stahování není dostatek volného místa na disku. Stahování vyžaduje {{required}}, ale na vybraném umístění je k dispozici pouze {{available}}.
download_error_reason_no_space_suggestion=Uvolněte místo na disku a zkuste to znovu.
download_error_reason_destination_title=Chyba zápisu
download_error_reason_destination_description=Nelze zapisovat do cílového umístění stahování z důvodu\:\n\nVýjimka\: {{exceptionName}}\nZpráva\: {{exceptionMessage}}.
download_error_reason_destination_suggestion=Vyberte jinou složku pro stahování nebo upravte oprávnění složky. Ujistěte se, že má aplikace správná oprávnění k zápisu do tohoto umístění.
download_error_reason_server_resume_change_title=Pokračování již není podporováno
download_error_reason_server_resume_change_description=Server již nepodporuje pokračování v tomto stahování.
download_error_reason_server_resume_change_suggestion=Zkuste to znovu. Pokud problém přetrvává, spusťte stahování znovu od začátku.
download_error_reason_timeout_title=Vypršel časový limit připojení
download_error_reason_timeout_description=Server odpovídal příliš dlouho a připojení bylo ukončeno. To se obvykle stává kvůli pomalému internetovému připojení, vysokému zatížení serveru nebo nestabilní síti.
download_error_reason_timeout_suggestion=Zkontrolujte své internetové připojení a zkuste to znovu.
download_error_reason_unknown_host_title=Server nebyl nalezen
download_error_reason_unknown_host_description=Adresu serveru se nepodařilo přeložit. To obvykle znamená, že doménový název je nesprávný, server je nedostupný nebo došlo k problému s DNS ve vaší síti.
download_error_reason_unknown_host_suggestion=Ujistěte se, že jste připojeni k internetu, zkontrolujte URL adresu ke stažení a zkuste to znovu. Pokud problém přetrvává, zkuste přepnout síť.
download_error_reason_connection_reset_title=Připojení bylo resetováno
download_error_reason_connection_reset_description=Připojení bylo během stahování souboru neočekávaně ukončeno. To se obvykle stává kvůli nestabilní síti, přerušení na straně serveru nebo kvůli firewallu, který připojení ukončil.
download_error_reason_connection_reset_suggestion=Zkontrolujte své internetové připojení a zkuste to znovu. Pokud používáte VPN nebo proxy, zkuste je vypnout. Pokud problém přetrvává, může být způsoben serverem.
download_error_reason_ssl_verification_failed_title=Zabezpečené připojení selhalo
download_error_reason_ssl_verification_failed_description=Nepodařilo se navázat zabezpečené připojení, protože nelze ověřit SSL certifikát. Příčinou může být nesprávně nastavené datum a čas systému, špatně nakonfigurovaný server nebo zachytávání síťového provozu.
download_error_reason_ssl_verification_failed_suggestion=Zkontrolujte datum a čas v systému.\nPokud používáte proxy, VPN nebo antivirus s kontrolou HTTPS provozu, zkuste je vypnout.\nPokud problém přetrvává, server může mít neplatný nebo špatně nakonfigurovaný certifikát.\n\nJako poslední možnost (nedoporučujeme) můžete v nastavení zapnout „Ignorovat SSL certifikáty“.\nTo snižuje zabezpečení a mělo by se používat pouze v případě, že připojení důvěřujete.
download_error_reason_default_title=Něco se pokazilo
download_error_reason_default_description=Při stahování souboru došlo k neočekávané chybě.\n\nVýjimka\: {{exceptionName}}\nZpráva\: {{exceptionMessage}}
download_error_reason_default_suggestion=Zkuste stahování restartovat. Pokud problém přetrvává, zkontrolujte své internetové připojení a odkaz ke stažení. Pokud si myslíte, že jde o chybu v aplikaci, nahlaste ji prosím, abychom ji mohli prošetřit.
