permissions_initial_title=Nastavení oprávnění
permissions_initial_description=Aby aplikace fungovala správně, potřebuje několik oprávnění. Na další obrazovce uvidíte, k čemu se jednotlivá oprávnění používají, a budete se moci rozhodnout, která z nich povolíte nebo přeskočíte.
permissions_done_title=Vše je připraveno
permissions_done_description=Vše je připraveno. Všechna požadovaná oprávnění byla udělena a aplikace připravena.
permissions_manage_storage_title=Správa přístupu k úložišti
permissions_manage_storage_reason=Toto oprávnění umožňuje aplikaci měnit složku stahování, přesněji detekovat duplicitní stahování a aktivovat některé další funkce. Je volitelné, ale doporučujeme ho pro zajištění nejlepšího zážitku z používání.
permission_read_write_external_storage_title=Čtení a zápis do úložiště
permission_read_write_external_storage_reason=Toto oprávnění umožňuje aplikaci ukládat a spravovat stažené soubory, měnit umístění stahování a zlepšit detekci duplicitních souborů.
permissions_post_notification_title=Oznámení
permissions_post_notification_reason=Aplikace musí běžet na pozadí, aby mohla spravovat stahování. Oznámení slouží k tomu, aby vás informovala o stavu a umožnila provoz na pozadí.
permissions_ignore_battery_optimization_title=Ignorovat optimalizaci baterie
permissions_ignore_battery_optimization_reason=Některá zařízení agresivně omezují aktivitu na pozadí, aby šetřila baterii, což může pozastavit nebo zastavit stahování, pokud aplikace není otevřená. Aplikaci můžete volitelně vyřadit z optimalizace baterie, abyste zajistili, že stahování bude pokračovat bez přerušení
