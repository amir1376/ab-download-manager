permissions_ignore_battery_optimization_title=Pil Optimizasyonunu Yoksay
permissions_ignore_battery_optimization_reason=Bazı cihazlar pil tasarrufu sağlamak için arka plan etkinliklerini agresif bir şekilde sınırlar, bu da uygulama açık değilken indirmeleri duraklatabilir veya durdurabilir. İndirmelerin kesintisiz devam etmesini sağlamak için uygulamayı isteğe bağlı olarak pil optimizasyonundan hariç tutabilirsiniz.
