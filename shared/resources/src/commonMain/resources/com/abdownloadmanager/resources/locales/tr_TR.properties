permissions_manage_storage_title=Depolama erişimini yönet
permissions_manage_storage_reason=Bu izin, uygulamanın indirme klasörünü değiştirmesine, yinelenen indirmeleri daha doğru bir şekilde tespit etmesine ve bazı ekstra özellikleri etkinleştirmesine olanak tanır. İsteğe bağlıdır, ancak en iyi deneyim için önerilir.
permission_read_write_external_storage_title=Depolamayı okuma ve yazma
permission_read_write_external_storage_reason=Bu izin, uygulamanın indirilen dosyaları kaydetmesine ve yönetmesine, indirme konumunu değiştirmesine ve yinelenen indirme algılamasını iyileştirmesine olanak tanır.
permissions_post_notification_title=Bildirim Gönderme
