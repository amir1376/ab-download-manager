permissions_initial_description=Uygulamanın düzgün çalışması için bazı izinlere ihtiyacı vardır. Bir sonraki ekranda, her bir iznin ne için kullanıldığını görecek ve hangilerine izin vereceğinize veya atlayacağınıza karar verebileceksiniz.
